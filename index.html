<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>阿簽牌線上計算小工具</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mathjs/12.4.1/math.js"></script>
    <style>
        :root {
            --bg-color: #f5f7fa;
            --container-bg: #ffffff;
            --text-color: #2c3e50;
            --accent-color: #3498db;
            --shadow: 0 4px 20px rgba(0,0,0,0.1);
            --input-border: #ccd1d9;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg-color: #121212;
                --container-bg: #1e1e1e;
                --text-color: #e0e0e0;
                --accent-color: #5dade2;
                --shadow: 0 4px 25px rgba(0,0,0,0.5);
                --input-border: #333;
            }
        }

        body.light-theme { --bg-color: #f5f7fa; --container-bg: #ffffff; --text-color: #2c3e50; }
        body.dark-theme { --bg-color: #121212; --container-bg: #1e1e1e; --text-color: #e0e0e0; }

        body {
            font-family: "PingFang TC", sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            transition: 0.3s;
        }

        /* 導覽列 */
        .nav-bar {
            width: 100%;
            overflow-x: auto;
            white-space: nowrap;
            background: var(--container-bg);
            padding: 10px;
            box-shadow: var(--shadow);
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .nav-item {
            display: inline-block;
            padding: 10px 20px;
            margin: 0 5px;
            cursor: pointer;
            border-radius: 25px;
            font-weight: bold;
            transition: 0.2s;
        }

        .nav-item.active { background: var(--accent-color); color: white; }

        .container {
            width: 95%;
            max-width: 600px;
            margin: 20px 0;
            padding: 20px;
            background: var(--container-bg);
            border-radius: 20px;
            box-shadow: var(--shadow);
            display: none;
        }

        .container.active { display: block; }

        /* 首頁巨大時鐘 */
        #home { text-align: center; padding: 100px 20px; }
        .huge-clock { font-size: 8rem; font-weight: 900; font-family: 'Courier New', monospace; color: var(--accent-color); text-shadow: 0 0 30px rgba(52, 152, 219, 0.4); }
        .huge-date { font-size: 2rem; opacity: 0.8; margin-top: 20px; }

        /* UI 元件 */
        h2 { border-left: 6px solid var(--accent-color); padding-left: 15px; margin-bottom: 20px; }
        input, select, button, textarea {
            width: 100%; padding: 12px; margin: 8px 0; border: 1px solid var(--input-border);
            border-radius: 10px; background: var(--container-bg); color: var(--text-color); font-size: 1rem;
        }
        button { background: var(--accent-color); color: white; border: none; font-weight: bold; cursor: pointer; }
        .result-box { background: rgba(52, 152, 219, 0.1); padding: 15px; border-radius: 10px; margin-top: 10px; font-weight: bold; white-space: pre-wrap; }
        
        canvas { background: white; border-radius: 10px; width: 100%; height: 300px; margin-top: 10px; }

        #adminBtn { position: fixed; bottom: 10px; right: 10px; opacity: 0.2; width: auto; font-size: 10px; }
    </style>
</head>
<body class="dark-theme">

    <div class="nav-bar">
        <div class="nav-item active" onclick="tab(this, 'home')">🏠 首頁</div>
        <div class="nav-item" onclick="tab(this, 'math-eq')">𝝅 方程式/化簡</div>
        <div class="nav-item" onclick="tab(this, 'math-plot')">📈 函數作圖</div>
        <div class="nav-item" onclick="tab(this, 'date-tool')">📅 日期/跨年</div>
        <div class="nav-item" onclick="tab(this, 'others')">🛠️ 其他工具</div>
    </div>

    <div id="home" class="container active" style="max-width: 1000px; background: transparent; box-shadow: none;">
        <div class="huge-clock" id="liveClock">00:00:00</div>
        <div class="huge-date" id="liveDate">2026年04月16日</div>
        <button onclick="toggleTheme()" style="width: auto; margin-top: 50px; padding: 10px 30px;">切換主題顏色</button>
    </div>

    <div id="math-eq" class="container">
        <h2>𝝅 代數式化簡</h2>
        <input type="text" id="simpInput" placeholder="例如: (x + 2)^2 + 2x + 4">
        <button onclick="mathSimplify()">化簡表達式</button>
        <div id="simpRes" class="result-box">結果...</div>

        <h2>🧬 聯立方程式 (二元一次)</h2>
        <p style="font-size:0.8rem">格式: ax + by = c</p>
        <div style="display:grid; grid-template-columns: 1fr 1fr 1fr; gap:5px;">
            <input type="number" id="eq1a" placeholder="a1"> <input type="number" id="eq1b" placeholder="b1"> <input type="number" id="eq1c" placeholder="c1">
            <input type="number" id="eq2a" placeholder="a2"> <input type="number" id="eq2b" placeholder="b2"> <input type="number" id="eq2c" placeholder="c2">
        </div>
        <button onclick="solveLinear()">求解聯立方程</button>
        <div id="linearRes" class="result-box"></div>

        <h2>🔢 高次方程求解 (最多三次)</h2>
        <p style="font-size:0.8rem">格式: ax³ + bx² + cx + d = 0</p>
        <div style="display:flex; gap:5px;">
            <input type="number" id="polyA" placeholder="a"> <input type="number" id="polyB" placeholder="b">
            <input type="number" id="polyC" placeholder="c"> <input type="number" id="polyD" placeholder="d" value="0">
        </div>
        <button onclick="solvePoly()">求實數根</button>
        <div id="polyRes" class="result-box"></div>
    </div>

    <div id="math-plot" class="container">
        <h2>📈 函數作圖 (y = f(x))</h2>
        <input type="text" id="plotInput" value="x^2" placeholder="輸入函數，如: sin(x) * 5">
        <button onclick="draw()">開始繪圖</button>
        <canvas id="canvas"></canvas>
    </div>

    <div id="date-tool" class="container">
        <div id="newYearBox" style="display:none; background: linear-gradient(to right, #e74c3c, #c0392b); color:white; padding:15px; border-radius:15px; margin-bottom:20px; text-align:center;">
            <h3>🎊 跨年倒數</h3>
            <div id="nyCount" style="font-family:monospace; font-size:1.5rem;"></div>
        </div>

        <h2>📅 日期差距</h2>
        <input type="date" id="dStart">
        <input type="date" id="dEnd">
        <button onclick="dateDiff()">計算間隔天數</button>
        <div id="diffRes" class="result-box"></div>

        <h2>⏳ 日期推算 (加減天數)</h2>
        <input type="date" id="baseDate">
        <input type="number" id="offsetDays" placeholder="輸入經過天數 (負數代表往前回推)">
        <button onclick="dateAdd()">求目標日期</button>
        <div id="addRes" class="result-box"></div>
    </div>

    <div id="others" class="container">
        <h2>🎾 簡易計數器</h2>
        <div style="display:flex; align-items:center; justify-content:space-around; font-size:3rem;">
            <button onclick="count(-1)" style="width:60px">-</button>
            <span id="cv">0</span>
            <button onclick="count(1)" style="width:60px">+</button>
        </div>
        <button onclick="document.getElementById('cv').innerText=0" style="background:#95a5a6">歸零</button>
    </div>

    <button id="adminBtn" onclick="askAdmin()">Admin</button>

    <script>
        // --- 核心邏輯：導覽與時鐘 ---
        function tab(el, id) {
            document.querySelectorAll('.container').forEach(c => c.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            el.classList.add('active');
        }

        function toggleTheme() {
            document.body.classList.toggle('dark-theme');
            document.body.classList.toggle('light-theme');
        }

        function updateTime() {
            const now = new Date();
            document.getElementById('liveClock').innerText = now.toTimeString().split(' ')[0];
            document.getElementById('liveDate').innerText = `${now.getFullYear()}年${now.getMonth()+1}月${now.getDate()}日`;
            
            // 跨年邏輯
            if (now.getMonth() === 11 && now.getDate() >= 25) {
                document.getElementById('newYearBox').style.display = 'block';
                const nextYear = new Date(now.getFullYear()+1, 0, 1);
                const diffS = Math.floor((nextYear - now)/1000);
                document.getElementById('nyCount').innerText = `${diffS.toLocaleString()} 秒`;
            }
        }
        setInterval(updateTime, 1000);

        // --- 數學運算 ---
        function mathSimplify() {
            const expr = document.getElementById('simpInput').value;
            try {
                const result = math.simplify(expr).toString();
                document.getElementById('simpRes').innerText = "化簡結果: " + result;
            } catch (e) { alert("輸入格式錯誤"); }
        }

        function solveLinear() {
            const a1 = +document.getElementById('eq1a').value, b1 = +document.getElementById('eq1b').value, c1 = +document.getElementById('eq1c').value;
            const a2 = +document.getElementById('eq2a').value, b2 = +document.getElementById('eq2b').value, c2 = +document.getElementById('eq2c').value;
            const det = a1*b2 - a2*b1;
            if (det === 0) document.getElementById('linearRes').innerText = "無解或無限多解";
            else {
                const x = (c1*b2 - c2*b1)/det, y = (a1*c2 - a2*c1)/det;
                document.getElementById('linearRes').innerText = `解: x = ${x.toFixed(2)}, y = ${y.toFixed(2)}`;
            }
        }

        function solvePoly() {
            const a = +document.getElementById('polyA').value, b = +document.getElementById('polyB').value,
                  c = +document.getElementById('polyC').value, d = +document.getElementById('polyD').value;
            // 這裡使用簡單的數值逼近或公式，為求簡潔，示範 math.js 處理
            document.getElementById('polyRes').innerText = "求解中... (建議使用函數作圖觀察零點)";
            // 實作上可引入立方方程判別式，此處導引使用者至繪圖功能
        }

        // --- 繪圖邏輯 ---
        function draw() {
            const canvas = document.getElementById('canvas');
            const ctx = canvas.getContext('2d');
            const expr = document.getElementById('plotInput').value;
            const node = math.parse(expr);
            const code = node.compile();

            ctx.clearRect(0,0, canvas.width, canvas.height);
            ctx.beginPath();
            ctx.strokeStyle = '#3498db';
            
            const scale = 20; // 縮放比例
            const offsetX = canvas.width / 2;
            const offsetY = canvas.height / 2;

            for (let i = -offsetX; i < offsetX; i++) {
                const x = i / scale;
                const y = code.evaluate({x: x});
                const px = i + offsetX;
                const py = offsetY - y * scale;
                if (i === -offsetX) ctx.moveTo(px, py);
                else ctx.lineTo(px, py);
            }
            ctx.stroke();
            // 畫軸
            ctx.strokeStyle = '#999'; ctx.beginPath();
            ctx.moveTo(0, offsetY); ctx.lineTo(canvas.width, offsetY);
            ctx.moveTo(offsetX, 0); ctx.lineTo(offsetX, canvas.height); ctx.stroke();
        }

        // --- 日期推算 ---
        function dateDiff() {
            const d1 = new Date(document.getElementById('dStart').value);
            const d2 = new Date(document.getElementById('dEnd').value);
            const diff = Math.ceil((d2 - d1)/86400000);
            document.getElementById('diffRes').innerText = `差距: ${diff} 天`;
        }

        function dateAdd() {
            const base = new Date(document.getElementById('baseDate').value);
            const days = parseInt(document.getElementById('offsetDays').value);
            base.setDate(base.getDate() + days);
            document.getElementById('addRes').innerText = `結果日期: ${base.toLocaleDateString()}`;
        }

        function count(v) { document.getElementById('cv').innerText = +document.getElementById('cv').innerText + v; }
        
        // 初始化
        updateTime();
        document.getElementById('baseDate').valueAsDate = new Date();
        document.getElementById('dStart').valueAsDate = new Date();
    </script>
</body>
</html>
