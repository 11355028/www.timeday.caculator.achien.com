<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>阿簽計算工具箱</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mathjs/12.4.1/math.js"></script>
    <style>
        :root {
            --bg-color: #f5f7fa;
            --container-bg: #ffffff;
            --text-color: #2c3e50;
            --accent-color: #3498db;
            --input-border: #ccd1d9;
            --shadow: 0 4px 20px rgba(0,0,0,0.1);
        }

        body.dark-theme {
            --bg-color: #121212;
            --container-bg: #1e1e1e;
            --text-color: #e0e0e0;
            --accent-color: #5dade2;
            --input-border: #333;
        }

        body {
            font-family: "PingFang TC", sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            transition: 0.3s;
        }

        .nav-bar {
            width: 100%;
            overflow-x: auto;
            white-space: nowrap;
            background: var(--container-bg);
            padding: 10px;
            box-shadow: var(--shadow);
            position: sticky;
            top: 0;
            z-index: 999;
        }

        .nav-item {
            display: inline-block;
            padding: 10px 20px;
            margin: 0 5px;
            cursor: pointer;
            border-radius: 25px;
            font-weight: bold;
        }

        .nav-item.active { background: var(--accent-color); color: white; }

        .container {
            width: 95%;
            max-width: 600px;
            margin: 20px 0;
            padding: 20px;
            background: var(--container-bg);
            border-radius: 20px;
            box-shadow: var(--shadow);
            display: none;
            box-sizing: border-box;
        }

        .container.active { display: block; }

        /* 首頁與時鐘 */
        #home { text-align: center; padding: 40px 20px; }
        .huge-clock { font-size: 5rem; font-weight: 900; font-family: monospace; color: var(--accent-color); margin: 10px 0; }
        
        #newYearHome {
            margin-top: 20px;
            padding: 20px;
            background: linear-gradient(135deg, #e74c3c, #c0392b);
            color: white;
            border-radius: 15px;
            display: none;
        }

        /* 籃球專用計分板樣式 */
        .game-timer-box { text-align: center; background: #000; color: #ff9f43; padding: 10px; border-radius: 10px; margin-bottom: 20px; border: 2px solid #333; }
        .game-time { font-family: 'Courier New', monospace; font-size: 3rem; font-weight: bold; }
        
        .score-board { display: grid; grid-template-columns: 1fr auto 1fr; align-items: start; text-align: center; gap: 10px; }
        .team-name { font-weight: bold; font-size: 1.2rem; margin-bottom: 5px; }
        .score-val { font-size: 4rem; font-weight: 900; color: var(--accent-color); line-height: 1; }
        .foul-box { margin-top: 10px; color: #e74c3c; font-weight: bold; font-size: 0.9rem; }
        
        .period-box { font-size: 1.2rem; font-weight: bold; background: var(--accent-color); color: white; padding: 5px 15px; border-radius: 5px; cursor: pointer; }

        .score-btns { display: flex; flex-wrap: wrap; justify-content: center; gap: 5px; margin-top: 10px; }
        .score-btn-small { width: 42px; height: 42px; border-radius: 50%; font-size: 0.8rem; padding: 0; background: var(--accent-color); color: white; border: none; cursor: pointer; }
        .foul-btn { background: #e67e22; margin-top: 5px; width: auto; padding: 5px 10px; border-radius: 5px; font-size: 0.7rem; }

        input, select, button {
            width: 100%; padding: 12px; margin: 8px 0; border: 1px solid var(--input-border);
            border-radius: 10px; background: var(--container-bg); color: var(--text-color); font-size: 1rem; box-sizing: border-box;
        }

        #adminBtn { position: fixed; bottom: 10px; right: 10px; width: auto; padding: 5px 10px; font-size: 10px; background: #95a5a6; opacity: 0.5; z-index: 1000; border: none; color: white; border-radius: 5px;}
    </style>
</head>
<body class="dark-theme">

    <div class="nav-bar">
        <div class="nav-item active" onclick="tab(this, 'home')">🏠 首頁</div>
        <div class="nav-item" onclick="tab(this, 'math')">𝝅 數學</div>
        <div class="nav-item" onclick="tab(this, 'dates')">📅 日期</div>
        <div class="nav-item" onclick="tab(this, 'games')">🏀 球賽計分</div>
    </div>

    <div id="home" class="container active" style="background: transparent; box-shadow: none;">
        <div class="huge-clock" id="liveClock">00:00:00</div>
        <div id="liveDate" style="font-size: 1.2rem; opacity: 0.8;"></div>
        <div id="newYearHome">
            <h3>🎊 跨年倒數</h3>
            <div id="nyDisplay" style="font-size: 2rem; font-weight: bold; font-family: monospace;"></div>
        </div>
        <button onclick="document.body.classList.toggle('dark-theme')" style="width: auto; margin-top: 30px; opacity: 0.6;">切換主題</button>
    </div>

    <div id="games" class="container">
        <select id="sportSel" onchange="initScoreBtns()">
            <option value="BSK">🏀 籃球模式</option>
            <option value="GEN">🏸 一般模式 (1分)</option>
        </select>

        <div id="basketballExtras">
            <div class="game-timer-box">
                <div style="font-size: 0.8rem; color: #888;">GAME TIMER</div>
                <div class="game-time" id="gameTime">12:00</div>
                <div style="display: flex; gap: 5px; justify-content: center;">
                    <button onclick="toggleGameTimer()" id="timerBtn" style="width: 80px; padding: 5px; font-size: 0.8rem; background: #27ae60;">START</button>
                    <button onclick="resetGameTimer()" style="width: 80px; padding: 5px; font-size: 0.8rem; background: #c0392b;">RESET</button>
                </div>
            </div>
            <div style="text-align: center; margin-bottom: 15px;">
                <span class="period-box" onclick="changePeriod()">PERIOD <span id="periodVal">1</span></span>
            </div>
        </div>
        
        <div class="score-board">
            <div>
                <div class="team-name">HOME</div>
                <div id="scA" class="score-val">0</div>
                <div class="foul-box">FOULS: <span id="foulA">0</span></div>
                <div id="btnsA" class="score-btns"></div>
                <button class="foul-btn" onclick="addFoul('A')">犯規 +1</button>
            </div>
            <div style="font-size: 1.5rem; padding-top: 20px; opacity: 0.3;">VS</div>
            <div>
                <div class="team-name">AWAY</div>
                <div id="scB" class="score-val">0</div>
                <div class="foul-box">FOULS: <span id="foulB">0</span></div>
                <div id="btnsB" class="score-btns"></div>
                <button class="foul-btn" onclick="addFoul('B')">犯規 +1</button>
            </div>
        </div>
        <button onclick="fullResetScore()" style="margin-top: 25px; background: #7f8c8d;">全場重置</button>
    </div>

    <div id="math" class="container">
        <h2>𝝅 方程式求解</h2>
        <input type="text" id="simpInput" placeholder="輸入算式: (x+2)^2">
        <button onclick="doSimp()">計算/化簡</button>
        <div id="simpRes" style="margin-top:10px; font-weight:bold;"></div>
    </div>

    <div id="dates" class="container">
        <h2>📅 日期推算</h2>
        <input type="date" id="baseDate">
        <input type="number" id="daysOffset" placeholder="天數 (例: 100)">
        <button onclick="calcDate()">求日期</button>
        <div id="dateRes" style="margin-top:10px; font-weight:bold;"></div>
    </div>

    <button id="adminBtn" onclick="askAdmin()">Admin</button>

    <script>
        // 分頁控制
        function tab(el, id) {
            document.querySelectorAll('.container').forEach(c => c.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            el.classList.add('active');
        }

        // 時鐘與跨年
        function updateClock() {
            const now = new Date();
            document.getElementById('liveClock').innerText = now.toTimeString().split(' ')[0];
            document.getElementById('liveDate').innerText = `${now.getFullYear()}年${now.getMonth()+1}月${now.getDate()}日`;
            
            if (now.getMonth() === 11 && now.getDate() >= 25) {
                document.getElementById('newYearHome').style.display = 'block';
                const nextYear = new Date(now.getFullYear()+1, 0, 1);
                const s = Math.floor((nextYear - now)/1000);
                document.getElementById('nyDisplay').innerText = s.toLocaleString() + " s";
            }
        }
        setInterval(updateClock, 1000);

        // --- 籃球計分系統 ---
        let scA = 0, scB = 0, flA = 0, flB = 0, period = 1;
        let gameTimeSec = 12 * 60;
        let timerRunning = false;
        let timerInterval;

        function initScoreBtns() {
            const mode = document.getElementById('sportSel').value;
            const bskExtras = document.getElementById('basketballExtras');
            bskExtras.style.display = (mode === 'BSK') ? 'block' : 'none';
            
            const points = (mode === 'BSK') ? [1, 2, 3] : [1];
            ['A', 'B'].forEach(t => {
                const container = document.getElementById('btns' + t);
                container.innerHTML = '';
                points.forEach(p => {
                    const btn = document.createElement('button');
                    btn.className = 'score-btn-small';
                    btn.innerText = '+' + p;
                    btn.onclick = () => {
                        if(t === 'A') { scA += p; document.getElementById('scA').innerText = scA; }
                        else { scB += p; document.getElementById('scB').innerText = scB; }
                    };
                    container.appendChild(btn);
                });
            });
        }

        function addFoul(t) {
            if(t === 'A') { flA++; document.getElementById('foulA').innerText = flA; }
            else { flB++; document.getElementById('foulB').innerText = flB; }
        }

        function changePeriod() {
            period = (period % 4) + 1;
            document.getElementById('periodVal').innerText = period;
        }

        function toggleGameTimer() {
            const btn = document.getElementById('timerBtn');
            if (timerRunning) {
                clearInterval(timerInterval);
                btn.innerText = 'START';
                btn.style.background = '#27ae60';
            } else {
                timerInterval = setInterval(() => {
                    if (gameTimeSec > 0) {
                        gameTimeSec--;
                        updateTimerDisplay();
                    } else {
                        clearInterval(timerInterval);
                        alert("時間到！");
                    }
                }, 1000);
                btn.innerText = 'STOP';
                btn.style.background = '#e67e22';
            }
            timerRunning = !timerRunning;
        }

        function updateTimerDisplay() {
            const m = Math.floor(gameTimeSec / 60);
            const s = gameTimeSec % 60;
            document.getElementById('gameTime').innerText = `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
        }

        function resetGameTimer() {
            clearInterval(timerInterval);
            timerRunning = false;
            gameTimeSec = 12 * 60;
            updateTimerDisplay();
            document.getElementById('timerBtn').innerText = 'START';
            document.getElementById('timerBtn').style.background = '#27ae60';
        }

        function fullResetScore() {
            scA = 0; scB = 0; flA = 0; flB = 0; period = 1;
            document.getElementById('scA').innerText = 0;
            document.getElementById('scB').innerText = 0;
            document.getElementById('foulA').innerText = 0;
            document.getElementById('foulB').innerText = 0;
            document.getElementById('periodVal').innerText = 1;
            resetGameTimer();
        }

        // 數學/日期
        function doSimp() {
            try { document.getElementById('simpRes').innerText = math.simplify(document.getElementById('simpInput').value).toString(); }
            catch(e) { document.getElementById('simpRes').innerText = "錯誤"; }
        }
        function calcDate() {
            const d = new Date(document.getElementById('baseDate').value);
            const offset = parseInt(document.getElementById('daysOffset').value);
            d.setDate(d.getDate() + offset);
            document.getElementById('dateRes').innerText = d.toLocaleDateString();
        }

        function askAdmin() { if(prompt("Pass:") === "27322935") alert("Admin Mode On"); }

        // 初始化
        initScoreBtns();
        updateClock();
        document.getElementById('baseDate').valueAsDate = new Date();
    </script>
</body>
</html>
